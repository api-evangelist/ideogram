specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ideogram
providerId: ideogram
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- Image Generation
- Text
- Realistic
- Editing
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Ideogram. Ideogram bills per image generated with rate based
  on rendering tier (Turbo / Default / Quality). Custom model training, dataset uploads, and
  editing operations consume additional cost. Tier choice is the dominant cost lever.
notes: Use Turbo for high-volume / draft workflows; switch to Quality only for final assets.
sources:
- https://ideogram.ai/features/api-pricing
- https://docs.ideogram.ai/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Ideogram
serviceCategory: AI
billingModel:
  pricingCategory: Usage-Based (Per Image)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Ideogram API
  ServiceCategory: AI
  ProviderName: Ideogram
  PublisherName: Ideogram
  InvoiceIssuerName: Ideogram
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: image_generations
  description: Image generations charged by rendering tier (Turbo/Default/Quality).
  unit: image
  aggregation: sum
  dimensions:
  - account
  - tier
  - model
- name: image_edits
  description: Edit / inpaint / remix / reframe / replace-background calls.
  unit: image
  aggregation: sum
  dimensions:
  - account
  - operation
- name: custom_model_training
  description: Custom model training jobs and dataset asset uploads.
  unit: training_job
  aggregation: sum
  dimensions:
  - account
  - dataset
principles:
- name: Visibility
  description: Track per-tier image usage and editing operations in the developer dashboard.
- name: Allocation
  description: Tag generations to creative project / brand to allocate spend.
- name: Optimization
  description: Default to Turbo for drafts; reserve Quality for hero assets and final output.
- name: Accountability
  description: Assign budget owners per creative workflow.
maintainers:
