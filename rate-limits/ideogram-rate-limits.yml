specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ideogram
providerId: ideogram
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Image Generation
- Text
- Realistic
- Editing
- Rate Limiting
- Quotas
- Throttling
description: >-
  Ideogram applies per-account rate limits and quotas not publicly documented in the OpenAPI
  spec. Standard 429 backoff applies. Production users should request rate limit increases
  via the developer portal.
notes: Specific RPS and concurrent generation caps are not publicly listed; contact developer support for high-volume needs.
sources:
- https://docs.ideogram.ai/
- https://developer.ideogram.ai/
responseCodes:
  throttled: 429
limits:
- name: HTTP Requests
  scope: account
  metric: requests
  limit: not publicly documented
  notes: Standard 429 backoff applies.
- name: Concurrent Generations
  scope: account
  metric: concurrent_generations
  limit: not publicly documented
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
- name: Tier Choice
  description: Use Turbo for drafts and high-volume workloads; reserve Quality for final assets to control rate budget consumption.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
