specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Ideogram
providerId: ideogram
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- Image Generation
- Text
- Realistic
- Editing
- Plans
description: >-
  Ideogram API uses a per-image rendering tier model: Turbo, Default, and Quality each priced
  per image. Reported public rates as of May 2026 are roughly $0.03 (Turbo) to $0.09
  (Quality) per image. Custom model training and editing operations consume additional
  charges. Subscription plans on the consumer site (Basic/Plus/Pro) are separate from API
  pricing.
notes: Reconciled per published API pricing references; verify exact rate sheet during sales conversation for production volumes.
sources:
- https://ideogram.ai/features/api-pricing
- https://docs.ideogram.ai/plans-and-pricing/ideogram-api
plans:
- id: ideogram-api-payg
  name: API Pay-as-you-go
  type: usage
  description: Pay per image generated; rate depends on rendering tier.
  entries:
  - label: Turbo Rendering
    name: turbo
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.03 USD/image (starting)
    userMultiplied: false
  - label: Default Rendering
    name: default
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.075 USD/image
    userMultiplied: false
  - label: Quality Rendering
    name: quality
    type: per_unit
    metric: image
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.09 USD/image
    userMultiplied: false
  elements:
  - name: Generate / Edit / Remix / Reframe / Inpaint
  - name: Custom Model training and dataset upload
  - name: Upscale / Describe / Remove Background / Replace Background / Layerize Text
- id: ideogram-api-enterprise
  name: API Enterprise
  type: enterprise
  description: Custom volume contract with dedicated quota and support.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
