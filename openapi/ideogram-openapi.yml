      description: >
        Lists custom models for the authenticated user. Use the `scope` parameter to control which models are returned.
        If omitted, returns both owned models and models shared with the user's organization via the model registry.
        `owned` returns only models created by the user. `shared` returns only models shared via the model registry,
        excluding the user's own models.
      tags:
        - subpackage_models
      parameters:
        - name: scope
          in: query
          description: >
            Controls which models are returned. Omit to return both owned and shared models combined. `owned` returns
            only models created by the authenticated user. `shared` returns only models shared with the user's
            organization via the model registry.
          required: false
          schema:
            $ref: '#/components/schemas/ModelsGetParametersScope'
        - name: status
          in: query
          description: >
            Filter by model status. Applied to owned models only; shared models in the model registry are already
            filtered to available versions. Example: `?status=TRAINING&status=COMPLETED`
          required: false
          schema:
