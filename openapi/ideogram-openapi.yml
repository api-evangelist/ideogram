      title: ModelsGetParametersScope
    ModelStatus:
      type: string
      enum:
        - CREATING
        - DRAFT
        - TRAINING
        - COMPLETED
        - ERRORED
        - ARCHIVED
      description: The status of a custom model.
      title: ModelStatus
    CustomModel:
      type: object
      properties:
        model_id:
          type: string
          description: Unique identifier for the model (base64 URL-safe encoded UUID).
        custom_model_uri:
          type:
            - string
            - 'null'
          description: |
            A custom model URI in the format model/<model_name>/version/<version_name>.
            Use this URI when generating images with this model. Only present for models
            that have been registered in the model registry.
        name:
          type: string
          description: Display name of the model.
        status:
          $ref: '#/components/schemas/ModelStatus'
        dataset_id:
          type:
            - string
            - 'null'
          description: ID of the dataset (collection) the model was trained from.
        creation_time:
          type: string
          format: date-time
          description: When the model was created.
        last_update_time:
          type:
            - string
            - 'null'
          format: date-time
          description: When the model was last updated.
        is_available_for_generation:
          type: boolean
          description: Whether the model is available for image generation.
        is_owned:
          type: boolean
          description: Whether the authenticated user owns this model.
      required:
        - model_id
        - name
        - status
        - creation_time
        - is_available_for_generation
        - is_owned
      description: A custom model.
      title: CustomModel
    ListModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/CustomModel'
          description: List of models.
      required:
        - models
      title: ListModelsResponse
    GetModelResponse:
      type: object
      properties:
        model:
          $ref: '#/components/schemas/CustomModel'
      required:
        - model
      title: GetModelResponse
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Api-Key
      description: API key for access control. Use in the header with the name \"Api-Key\"
