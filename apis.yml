name: Ideogram
kind: company
description: Ideogram is an image generation platform notable for industry-leading text-in-image rendering. The Ideogram API
  (3.0 and beyond) supports generation, edit, inpaint, remix, reframe, replace background, layerize text, upscale, describe,
  and remove background, plus custom model training with dataset and asset management. Authenticated REST API with published
  OpenAPI 3.1 spec.
